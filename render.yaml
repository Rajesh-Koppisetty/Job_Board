services:
  - type: web
    name: jobboard-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: 8080
